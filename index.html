const KEYS = {

  income: "jl_other_income",
  nextInv: "jl_next_inv",
  settings: "jl_settings",
};

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}

function save(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch(e) { console.error("Storage error", e); }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function fmtGBP(n) {
  return `£${Number(n || 0).toFixed(2)}`;
}

function nextInvNum(n) {
  return `INV-${String(n).padStart(3, "0")}`;
}

function dueDate(iso) {
  const d = new Date(iso);
  d.setDate(d.getDate() + 14);
  return d.toISOString().slice(0, 10);
}

<html>

  const blob = new Blob([html], { type: 'text/html' });

  const a = document.createElement('a');
  a.href = url;
  a.download = `${inv.number}-${inv.clientName.replace(/\s+/g, '-')}.html`;

  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

function buildInvoiceText(inv, settings) {
  const lines = [
    `INVOICE`,
    ``,
    `From: ${settings.name}`,
    `      ${settings.email}  ·  ${settings.phone}`,
    ``,
    `Invoice No: ${inv.number}`,
    `Date:       ${fmtDate(inv.date)}`,
    `Due:        ${fmtDate(inv.due)}`,
    ``,
    `Bill To: ${inv.clientName}`,
    inv.clientEmail ? `         ${inv.clientEmail}` : "",
    ``,
    `Description: ${inv.description}`,
    ``,
    `  ${inv.qty} × lesson${inv.qty > 1 ? "s" : ""} @ ${fmtGBP(inv.rate)}`,
    ``,
    `TOTAL DUE: ${fmtGBP(inv.amount)}`,
    ``,
    `─────────────────────────────`,
    `Payment details`,
    `Account name: ${settings.accountName}`,
    `Sort code:    ${settings.sortCode}`,
    `Account no:   ${settings.accountNo}`,
    `Reference:    ${inv.number} — ${inv.clientName}`,
    ``,
    `Please use the reference above so your payment can be identified.`,
    `Thank you.`,
  ].filter((l) => l !== null);
  return lines.join("\n");
}

  const persistSettings = useCallback((v) => { setSettings(v); save(KEYS.settings, v); }, []);

  if (loading) return (

    </>

  const props = { roster, invoices, expenses, otherIncome, nextInv, settings, persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistNextInv, persistSettings };

  return (

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ invoices, expenses, otherIncome, roster, setTab }) {
  const invoiceIncome = invoices.filter(i => i.status === "paid").reduce((a, i) => a + i.amount, 0);
  const extraIncome = otherIncome.reduce((a, i) => a + i.amount, 0);
  const totalIncome = invoiceIncome + extraIncome;
  const outstanding = invoices.filter(i => i.status === "sent").reduce((a, i) => a + i.amount, 0);
  const totalExp = expenses.reduce((a, e) => a + e.amount, 0);
  const overdue = invoices.filter(i => i.status === "sent" && i.due < today());
  const recent = [...invoices].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 5);

  const streams = [
    ["School teaching", invoices.filter(i => i.status === "paid" && i.type === "school").reduce((a,i) => a+i.amount, 0)],
    ["Private teaching", invoices.filter(i => i.status === "paid" && i.type === "private").reduce((a,i) => a+i.amount, 0)],
    ["Performances", invoices.filter(i => i.status === "paid" && i.type === "performance").reduce((a,i) => a+i.amount, 0) + otherIncome.filter(i => i.source === "Performance").reduce((a,i) => a+i.amount, 0)],
    ["Substack", otherIncome.filter(i => i.source === "Substack").reduce((a,i) => a+i.amount, 0)],
    ["Other", otherIncome.filter(i => i.source === "Other").reduce((a,i) => a+i.amount, 0)],
  ];

  return (
    <>
      <div className="stats">
        <div className="stat"><div className="stat-val">{fmtGBP(totalIncome)}</div><div className="stat-label">Income received</div></div>
        <div className="stat"><div className="stat-val">{fmtGBP(outstanding)}</div><div className="stat-label">Outstanding</div></div>
        <div className="stat"><div className="stat-val">{fmtGBP(totalIncome - totalExp)}</div><div className="stat-label">Net profit</div></div>
        <div className="stat"><div className="stat-val">{roster.length}</div><div className="stat-label">Students on roster</div></div>
      </div>

      {overdue.length > 0 && (
        <div className="panel" style={{borderColor: C.danger}}>
          <div className="panel-title text-danger">Overdue invoices</div>
          {overdue.map(inv => (
            <div key={inv.id} className="row mt-8">
              <span>{inv.number}</span>
              <span className="text-muted">— {inv.clientName}</span>
              <span className="spacer" />
              <span className="text-danger">{fmtGBP(inv.amount)}</span>
              <span className="text-muted" style={{fontSize:12}}>due {fmtDate(inv.due)}</span>
            </div>
          ))}
        </div>
      )}

      <div className="panel">
        <div className="panel-title">Income by stream</div>
        {streams.map(([label, val]) => (
          <div key={label} className="row" style={{padding:"6px 0", borderBottom:`1px solid ${C.border}`}}>
            <span className="text-muted" style={{fontSize:13}}>{label}</span>
            <span className="spacer" />
            <span style={{fontFamily:"'Cormorant Garamond', serif", fontSize:16}} className={val > 0 ? "" : "text-muted"}>{val > 0 ? fmtGBP(val) : "—"}</span>
          </div>
        ))}
      </div>

      <div className="panel">
        <div className="row">
          <div className="panel-title" style={{marginBottom:0}}>Recent invoices</div>
          <div className="spacer" />
          <button className="btn btn-ghost btn-sm" onClick={() => setTab("log")}>View all</button>
        </div>
        <div className="mt-16">
          {recent.length === 0 ? <div className="empty">No invoices yet — create your first one.</div> : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Invoice</th><th>Client</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>

// ── Roster ────────────────────────────────────────────────────────────────────
function Roster({ roster, persistRoster }) {
  const [subTab, setSubTab] = useState("school");
  const [form, setForm] = useState(null);

  const blank = (type) => ({
    id: Date.now(), type,
    firstName: "", surname: "", yearGroup: "", guardianName: "",
    email: "", organisation: "", address1: "", address2: "", city: "", postcode: "",
    rate: "", duration: "30 min", payment: "", notes: ""
  });

  const schoolStudents = roster.filter(s => s.type === "school");
  const privateStudents = roster.filter(s => s.type === "private");
  const performanceContacts = roster.filter(s => s.type === "performance");
  const substackContacts = roster.filter(s => s.type === "substack");

  const lists = { school: schoolStudents, private: privateStudents, performance: performanceContacts, substack: substackContacts };

  function save(student) {
    const exists = roster.find(r => r.id === student.id);
    const updated = exists ? roster.map(r => r.id === student.id ? student : r) : [...roster, student];
    persistRoster(updated);
    setForm(null);
  }

  function del(id) {
    persistRoster(roster.filter(r => r.id !== id));
  }

  return (
    <>
      <div className="tabs">
        <button className={`tab${subTab==="school"?" active":""}`} onClick={() => setSubTab("school")}>St Margaret's ({schoolStudents.length})</button>
        <button className={`tab${subTab==="private"?" active":""}`} onClick={() => setSubTab("private")}>Private ({privateStudents.length})</button>
        <button className={`tab${subTab==="performance"?" active":""}`} onClick={() => setSubTab("performance")}>Performances ({performanceContacts.length})</button>
        <button className={`tab${subTab==="substack"?" active":""}`} onClick={() => setSubTab("substack")}>Substack ({substackContacts.length})</button>
      </div>

      {form ? (
        <StudentForm student={form} onSave={save} onCancel={() => setForm(null)} />
      ) : (
        <>
          <div className="row" style={{marginBottom:16}}>
            <div className="spacer" />
            <button className="btn btn-primary" onClick={() => setForm(blank(subTab))}>+ Add {subTab === "school" || subTab === "private" ? "student" : subTab === "performance" ? "client / venue" : "contact"}</button>
          </div>
          <StudentTable
            students={lists[subTab]}
            type={subTab}
            onEdit={setForm}
            onDelete={del}
          />
        </>
      )}
    </>
  );
}

// ── New Invoice ───────────────────────────────────────────────────────────────
function NewInvoice({ roster, invoices, nextInv, settings, persistInvoices, persistNextInv }) {
  const [invType, setInvType] = useState("school");
  const [studentId, setStudentId] = useState("");
  const [qty, setQty] = useState(10);
  const [term, setTerm] = useState("Autumn 2025");
  const [invDate, setInvDate] = useState(today());
  const [preview, setPreview] = useState(null);
  const [sent, setSent] = useState(false);

  const students = roster.filter(s => s.type === invType);
  const student = students.find(s => s.id === Number(studentId));
  const [customRate, setCustomRate] = useState("");
  const baseRate = invType === "school" ? settings.schoolRate : (student?.rate || 0);
  const rate = invType === "performance" && customRate !== "" ? Number(customRate) : baseRate;
  const amount = qty * rate;
  const number = nextInvNum(nextInv);

  function buildInvoice() {
    const clientName = invType === "school"
      ? (student.guardianName || `${student.firstName} ${student.surname}`)
      : invType === "performance"
        ? (student.organisation || student.firstName)
        : student.firstName;
    const clientEmail = student.email || "";
    const description = invType === "school"
      ? `Guitar tuition — ${student.firstName} ${student.surname}, ${term}`
      : invType === "performance"
        ? `Performance fee — ${student.organisation || student.firstName}`
        : `Guitar tuition — ${student.firstName}`;

    return {
      id: Date.now(),
      number,
      type: invType,
      clientName,
      clientEmail,
      studentName: invType === "school" ? `${student.firstName} ${student.surname}` : student.firstName,
      description,
      qty: Number(qty),
      rate: Number(rate),
      amount: Number(amount),
      date: invDate,
      due: dueDate(invDate),
      term: invType === "school" ? term : "",
      status: "draft",
    };
  }

  function handlePreview() {
    if (!student) return;
    setPreview(buildInvoice());
    setSent(false);
  }

  async function handleSendEmail() {
    const inv = preview || buildInvoice();
    const body = buildInvoiceText(inv, settings);
    const subject = `${inv.number} — Guitar tuition — ${inv.clientName}`;
    const mailto = `mailto:${inv.clientEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto, "_blank");

    // Save to log with status "sent"
    const saved = { ...inv, status: "sent" };
    const updated = [...invoices, saved];
    persistInvoices(updated);
    persistNextInv(nextInv + 1);
    setSent(true);
    setPreview(saved);
  }

  return (
    <>
      <div className="panel">
        <div className="panel-title">Create invoice</div>

        <div className="tabs" style={{marginBottom:16}}>
          <button className={`tab${invType==="school"?" active":""}`} onClick={() => { setInvType("school"); setStudentId(""); setQty(10); setCustomRate(""); }}>School</button>
          <button className={`tab${invType==="private"?" active":""}`} onClick={() => { setInvType("private"); setStudentId(""); setQty(1); setCustomRate(""); }}>Private</button>
          <button className={`tab${invType==="performance"?" active":""}`} onClick={() => { setInvType("performance"); setStudentId(""); setQty(1); setCustomRate(""); }}>Performance</button>
        </div>

        <div className="grid-2">
          <div className="field">
            <label>{invType === "performance" ? "Client / venue" : "Student"}</label>
            <select value={studentId} onChange={e => { setStudentId(e.target.value); setCustomRate(""); }}>
              <option value="">— select —</option>
              {students.map(s => (
                <option key={s.id} value={s.id}>
                  {invType === "school" ? `${s.firstName} ${s.surname}` : invType === "performance" ? (s.organisation || s.firstName) : s.firstName}
                </option>
              ))}
            </select>
          </div>
          <div className="field"><label>Invoice date</label><input type="date" value={invDate} onChange={e => setInvDate(e.target.value)} /></div>
        </div>

        <div className="grid-3">
          <div className="field">
            <label>{invType === "performance" ? "Engagements (qty)" : "Lessons (qty)"}</label>
            <input type="number" value={qty} onChange={e => setQty(e.target.value)} min={1} />
          </div>
          <div className="field">
            <label>{invType === "performance" ? "Fee (£) — editable" : "Rate (£)"}</label>
            {invType === "performance" ? (
              <input type="number" value={customRate !== "" ? customRate : baseRate} onChange={e => setCustomRate(e.target.value)} />
            ) : (
              <input type="number" value={rate} readOnly style={{opacity:.7}} />
            )}
          </div>
          {invType === "school" && (
            <div className="field">
              <label>Term</label>
              <select value={term} onChange={e => setTerm(e.target.value)}>
                {["Autumn 2024","Spring 2025","Summer 2025","Autumn 2025","Spring 2026","Summer 2026","Autumn 2026"].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
          )}
        </div>

        {student && (
          <div className="row" style={{marginTop:8, padding:"10px 12px", background: C.raised, borderRadius:4}}>
            <span className="text-muted" style={{fontSize:12}}>Invoice {number}</span>
            <span className="spacer" />
            <span style={{fontFamily:"'Cormorant Garamond', serif", fontSize:18}}>{fmtGBP(amount)}</span>
          </div>
        )}

        <div className="row mt-16">
          <button className="btn btn-primary" onClick={handlePreview} disabled={!student}>Preview invoice</button>
        </div>
      </div>

      {preview && (
        <div>
          <InvoicePreview inv={preview} settings={settings} />
          <div className="row mt-16">
            {!sent ? (
              <button className="btn btn-success" onClick={handleSendEmail}>
                Open in Mail — {preview.clientEmail || "no email on file"}
              </button>
            ) : (
              <span className="text-success">✓ Saved to invoice log as Sent</span>
            )}
            <button className="btn btn-ghost" onClick={async () => {
              downloadInvoice(preview, settings);
              if (!sent) {
                const saved = { ...preview, status: "sent" };
                persistInvoices([...invoices, saved]);
                persistNextInv(nextInv + 1);
                setSent(true);
                setPreview(saved);
              }
            }}>
              Download PDF
            </button>
          </div>
        </div>
      )}
    </>
  );
}

// ── Invoice Log ───────────────────────────────────────────────────────────────
function InvoiceLog({ invoices, persistInvoices }) {
  const sorted = [...invoices].sort((a, b) => b.date.localeCompare(a.date));

  async function markPaid(id) {
    const updated = invoices.map(i => i.id === id ? { ...i, status: "paid", paidDate: today() } : i);
    persistInvoices(updated);
  }

  async function del(id) {
    persistInvoices(invoices.filter(i => i.id !== id));
  }

  if (sorted.length === 0) return <div className="empty">No invoices yet.</div>;

  return (
    <div className="table-wrap">
      <table>
        <thead>
          <tr><th>No.</th><th>Client</th><th>Type</th><th>Date</th><th>Due</th><th>Amount</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
          {sorted.map(inv => (
            <tr key={inv.id}>
              <td className="text-accent">{inv.number}</td>
              <td>{inv.clientName}</td>
              <td className="text-muted" style={{textTransform:"capitalize"}}>{inv.type}</td>
              <td className="text-muted">{fmtDate(inv.date)}</td>
              <td className={inv.status === "sent" && inv.due < today() ? "text-danger" : "text-muted"}>{fmtDate(inv.due)}</td>
              <td>{fmtGBP(inv.amount)}</td>
              <td><StatusBadge status={inv.status === "sent" && inv.due < today() ? "overdue" : inv.status} /></td>
              <td>
                <div className="row">
                  {inv.status !== "paid" && (
                    <button className="btn btn-success btn-sm" onClick={() => markPaid(inv.id)}>Mark paid</button>
                  )}
                  <button className="btn btn-danger btn-sm" onClick={() => del(inv.id)}>×</button>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Expenses ──────────────────────────────────────────────────────────────────
function ExpensesPage({ expenses, invoices, otherIncome, persistExpenses, persistOtherIncome }) {
  const [subTab, setSubTab] = useState("income");
  const [form, setForm] = useState({ date: today(), description: "", category: "Strings & consumables", supplier: "", amount: "", receipt: false, notes: "" });
  const [incForm, setIncForm] = useState({ date: today(), source: "Performance", description: "", payer: "", amount: "", notes: "" });

  const CATS = ["Strings & consumables","Sheet music / scores","Equipment","Travel","Professional development","Software / subscriptions","Marketing","Insurance","Other"];
  const SOURCES = ["Performance","Substack","Other"];

  async function addExpense() {
    if (!form.description || !form.amount) return;
    const updated = [...expenses, { ...form, id: Date.now(), amount: Number(form.amount) }];
    persistExpenses(updated);
    setForm({ date: today(), description: "", category: "Strings & consumables", supplier: "", amount: "", receipt: false, notes: "" });
  }

  async function delExpense(id) {
    persistExpenses(expenses.filter(e => e.id !== id));
  }

  async function addIncome() {
    if (!incForm.description || !incForm.amount) return;
    const updated = [...otherIncome, { ...incForm, id: Date.now(), amount: Number(incForm.amount) }];
    persistOtherIncome(updated);
    setIncForm({ date: today(), source: "Performance", description: "", payer: "", amount: "", notes: "" });
  }

  async function delIncome(id) {
    persistOtherIncome(otherIncome.filter(e => e.id !== id));
  }

  const invoiceIncome = invoices.filter(i => i.status === "paid").reduce((a, i) => a + i.amount, 0);
  const extraIncome = otherIncome.reduce((a, i) => a + i.amount, 0);
  const totalIncome = invoiceIncome + extraIncome;
  const totalExp = expenses.reduce((a, e) => a + e.amount, 0);

  // Monthly summary
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug"];
  const years = { "Sep":2025,"Oct":2025,"Nov":2025,"Dec":2025,"Jan":2026,"Feb":2026,"Mar":2026,"Apr":2026,"May":2026,"Jun":2026,"Jul":2026,"Aug":2026 };

  function monthIncome(m, y) {
    return invoices.filter(i => i.status === "paid" && i.date.startsWith(`${y}-${String(Object.keys(years).indexOf(m)+9>12?Object.keys(years).indexOf(m)-3:Object.keys(years).indexOf(m)+9).padStart(2,"0")}`)).reduce((a,i) => a+i.amount, 0);
  }

  return (
    <>
      <div className="tabs">
        <button className={`tab${subTab==="income"?" active":""}`} onClick={() => setSubTab("income")}>Other Income</button>
        <button className={`tab${subTab==="expenses"?" active":""}`} onClick={() => setSubTab("expenses")}>Expenses</button>
        <button className={`tab${subTab==="summary"?" active":""}`} onClick={() => setSubTab("summary")}>Summary</button>
      </div>

      {subTab === "income" && (
        <>
          <div className="panel">
            <div className="panel-title">Add income — performances, Substack, other</div>
            <div className="grid-3">
              <div className="field"><label>Date</label><input type="date" value={incForm.date} onChange={e => setIncForm({...incForm, date:e.target.value})} /></div>
              <div className="field"><label>Source</label>
                <select value={incForm.source} onChange={e => setIncForm({...incForm, source:e.target.value})}>
                  {SOURCES.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="field"><label>Amount (£)</label><input type="number" value={incForm.amount} onChange={e => setIncForm({...incForm, amount:e.target.value})} /></div>
            </div>
            <div className="grid-2">
              <div className="field"><label>Description</label><input value={incForm.description} onChange={e => setIncForm({...incForm, description:e.target.value})} placeholder="e.g. Live Music Now concert, March payout" /></div>
              <div className="field"><label>Payer / venue</label><input value={incForm.payer} onChange={e => setIncForm({...incForm, payer:e.target.value})} placeholder="e.g. Concert society, Substack" /></div>
            </div>
            <button className="btn btn-primary" onClick={addIncome}>Add income</button>
          </div>

          <div className="table-wrap">
            {otherIncome.length === 0 ? <div className="empty">No performance or Substack income recorded yet.</div> : (
              <table>
                <thead><tr><th>Date</th><th>Source</th><th>Description</th><th>Payer</th><th>Amount</th><th></th></tr></thead>
                <tbody>
                  {[...otherIncome].sort((a,b) => b.date.localeCompare(a.date)).map(e => (
                    <tr key={e.id}>
                      <td className="text-muted">{fmtDate(e.date)}</td>
                      <td><span className="badge badge-sent">{e.source}</span></td>
                      <td>{e.description}</td>
                      <td className="text-muted">{e.payer || "—"}</td>
                      <td className="text-success">{fmtGBP(e.amount)}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={() => delIncome(e.id)}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {subTab === "expenses" && (
        <>
          <div className="panel">
            <div className="panel-title">Add expense</div>
            <div className="grid-3">
              <div className="field"><label>Date</label><input type="date" value={form.date} onChange={e => setForm({...form, date:e.target.value})} /></div>
              <div className="field"><label>Description</label><input value={form.description} onChange={e => setForm({...form, description:e.target.value})} /></div>
              <div className="field"><label>Category</label>
                <select value={form.category} onChange={e => setForm({...form, category:e.target.value})}>
                  {CATS.map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="grid-3">
              <div className="field"><label>Supplier</label><input value={form.supplier} onChange={e => setForm({...form, supplier:e.target.value})} /></div>
              <div className="field"><label>Amount (£)</label><input type="number" value={form.amount} onChange={e => setForm({...form, amount:e.target.value})} /></div>
              <div className="field"><label>Notes</label><input value={form.notes} onChange={e => setForm({...form, notes:e.target.value})} /></div>
            </div>
            <button className="btn btn-primary" onClick={addExpense}>Add expense</button>
          </div>

          <div className="table-wrap">
            {expenses.length === 0 ? <div className="empty">No expenses recorded yet.</div> : (
              <table>
                <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Supplier</th><th>Amount</th><th></th></tr></thead>
                <tbody>
                  {[...expenses].sort((a,b) => b.date.localeCompare(a.date)).map(e => (
                    <tr key={e.id}>
                      <td className="text-muted">{fmtDate(e.date)}</td>
                      <td>{e.description}</td>
                      <td className="text-muted">{e.category}</td>
                      <td className="text-muted">{e.supplier || "—"}</td>
                      <td>{fmtGBP(e.amount)}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={() => delExpense(e.id)}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {subTab === "summary" && (
        <>
          <div className="stats">
            <div className="stat"><div className="stat-val">{fmtGBP(totalIncome)}</div><div className="stat-label">Total income</div></div>
            <div className="stat"><div className="stat-val">{fmtGBP(totalExp)}</div><div className="stat-label">Total expenses</div></div>
            <div className="stat"><div className="stat-val">{fmtGBP(totalIncome - totalExp)}</div><div className="stat-label">Net profit</div></div>
          </div>
          <div className="panel">
            <div className="panel-title">2025/26 monthly breakdown</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Month</th><th>Income</th><th>Expenses</th><th>Net</th></tr></thead>
                <tbody>
                  {months.map((m, idx) => {
                    const y = years[m];
                    const mNum = String(idx < 4 ? idx + 9 : idx - 3).padStart(2, "0");
                    const inc = invoices.filter(i => i.status === "paid" && i.date.startsWith(`${y}-${mNum}`)).reduce((a,i) => a+i.amount, 0)
                      + otherIncome.filter(i => i.date.startsWith(`${y}-${mNum}`)).reduce((a,i) => a+i.amount, 0);
                    const exp = expenses.filter(e => e.date.startsWith(`${y}-${mNum}`)).reduce((a,e) => a+e.amount, 0);
                    const net = inc - exp;
                    return (
                      <tr key={m}>
                        <td>{m} {y}</td>
                        <td className="text-success">{inc > 0 ? fmtGBP(inc) : <span className="text-muted">—</span>}</td>
                        <td className="text-danger">{exp > 0 ? fmtGBP(exp) : <span className="text-muted">—</span>}</td>
                        <td className={net > 0 ? "text-success" : net < 0 ? "text-danger" : "text-muted"}>{net !== 0 ? fmtGBP(net) : "—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </>
  );
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportData(roster, invoices, expenses, otherIncome, settings) {
  const data = {
    exportDate: new Date().toISOString(),
    settings,
    roster,
    invoices,
    expenses,
    otherIncome,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jlguitar-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file, persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistSettings, persistNextInv, setMsg) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.roster) persistRoster(data.roster);
      if (data.invoices) persistInvoices(data.invoices);
      if (data.expenses) persistExpenses(data.expenses);
      if (data.otherIncome) persistOtherIncome(data.otherIncome);
      if (data.settings) persistSettings(data.settings);
      if (data.invoices && data.invoices.length > 0) {
        const maxInv = data.invoices.reduce((max, inv) => {
          const n = parseInt(inv.number.replace('INV-', ''));
          return n > max ? n : max;
        }, 0);
        persistNextInv(maxInv + 1);
      }
      setMsg('✓ Data restored successfully');
    } catch {
      setMsg('Import failed — file may be corrupted');
    }
  };
  reader.readAsText(file);
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({ settings, persistSettings, roster, invoices, expenses, otherIncome, persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistNextInv }) {
  const [s, setS] = useState(settings);
  const [msg, setMsg] = useState("");

  return (
    <>
    <div className="panel">
      <div className="panel-title">Your details</div>
      <div className="grid-2">
        <div className="field"><label>Full name</label><input value={s.name} onChange={f("name")} /></div>
        <div className="field"><label>Business name</label><input value={s.business} onChange={f("business")} /></div>
        <div className="field"><label>Email</label><input value={s.email} onChange={f("email")} /></div>
        <div className="field"><label>Phone</label><input value={s.phone} onChange={f("phone")} /></div>
      </div>
      <div className="panel-title" style={{marginTop:20}}>Bank details</div>
      <div className="grid-3">
        <div className="field"><label>Account name</label><input value={s.accountName} onChange={f("accountName")} /></div>
        <div className="field"><label>Sort code</label><input value={s.sortCode} onChange={f("sortCode")} placeholder="XX-XX-XX" /></div>
        <div className="field"><label>Account number</label><input value={s.accountNo} onChange={f("accountNo")} /></div>
      </div>
      <div className="panel-title" style={{marginTop:20}}>Rates</div>
      <div className="field" style={{maxWidth:200}}>
        <label>St Margaret's rate per lesson (£)</label>
        <input type="number" value={s.schoolRate} onChange={f("schoolRate")} />
      </div>
      <button className="btn btn-primary mt-16" onClick={() => persistSettings(s)}>Save settings</button>
    </div>
    <div className="panel" style={{marginTop:0}}>
      <div className="panel-title">Data backup</div>
      <p className="text-muted" style={{fontSize:13, marginBottom:16}}>Export a backup of all your data — roster, invoices, expenses, and settings — as a JSON file saved to your device. Import it here to restore.</p>
      <div className="row">
        <button className="btn btn-primary" onClick={() => exportData(roster, invoices, expenses, otherIncome, settings)}>Export backup</button>
        <label className="btn btn-ghost" style={{cursor:"pointer"}}>
          Import backup
          <input type="file" accept=".json" style={{display:"none"}} onChange={e => { if (e.target.files[0]) importData(e.target.files[0], persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistSettings, persistNextInv, setMsg); }} />
        </label>
      </div>
      {msg && <p className="text-success mt-8" style={{fontSize:13}}>{msg}</p>}
    </div>
    </>
  );
}

// ── Status badge ──────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = { draft:"badge-draft", sent:"badge-sent", paid:"badge-paid", overdue:"badge-overdue" };
  return <span className={`badge ${map[status] || "badge-draft"}`}>{status}</span>;
}
