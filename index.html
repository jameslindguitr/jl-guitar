const KEYS = {
  roster: "jl_roster",
  invoices: "jl_invoice_log",
  expenses: "jl_expenses",
  income: "jl_other_income",
  nextInv: "jl_next_inv",
  settings: "jl_settings",
};

let CURRENT_UID = null;
let DOC_CACHE = {};
function sanitise(value) { return JSON.parse(JSON.stringify(value === undefined ? null : value)); }
async function loadAll(uid) {
  CURRENT_UID = uid;
  try {
    const ref = window.fbDoc(window.fbDb, "users", uid);
    const snap = await window.fbGetDoc(ref);
    DOC_CACHE = snap.exists() ? snap.data() : {};
  } catch (e) { console.error("Firestore load error", e); DOC_CACHE = {}; }
  return DOC_CACHE;
}
function load(key, fallback) {
  const v = DOC_CACHE[key];
  return (v === undefined || v === null) ? fallback : v;
}
async function save(key, value) {
  const clean = sanitise(value);
  DOC_CACHE[key] = clean;
  try {
    const ref = window.fbDoc(window.fbDb, "users", CURRENT_UID);
    await window.fbSetDoc(ref, { [key]: clean }, { merge: true });
  } catch (e) { console.error("Firestore save error", e); alert("Could not save to the cloud: " + e.message); }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function fmtGBP(n) {
  return `£${Number(n || 0).toFixed(2)}`;
}

function nextInvNum(n) {
  return `INV-${String(n).padStart(3, "0")}`;
}

function dueDate(iso) {
  const d = new Date(iso);
  d.setDate(d.getDate() + 14);
  return d.toISOString().slice(0, 10);
}

// ── Invoice PDF-style content (plain text for mailto body) ───────────────────
function downloadInvoice(inv, settings) {
  const fileName = `${inv.number}-${inv.clientName.replace(/\s+/g, '-')}.pdf`;

  // jsPDF is bundled inside html2pdf; grab the constructor either way.
  const JsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!JsPDF) {
    alert("PDF library not loaded. Please refresh and try again.");
    return;
  }

  const doc = new JsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
  const pageW = 210;
  const M = 20;            // margin
  const right = pageW - M; // right edge
  let y = M + 4;

  const gbp = (n) => "\u00A3" + Number(n).toFixed(2);

  // ── Header ──
  doc.setFont("helvetica", "bold");
  doc.setFontSize(16);
  doc.setTextColor(26, 26, 24);
  doc.text(settings.business || "James Lind Guitar", M, y);

  doc.setFont("helvetica", "normal");
  doc.setFontSize(22);
  doc.text("INVOICE", right, y, { align: "right" });

  y += 6;
  doc.setFontSize(9);
  doc.setTextColor(110, 110, 110);
  const contact = [settings.email, settings.phone].filter(Boolean).join("   ");
  if (contact) doc.text(contact, M, y);

  doc.setTextColor(26, 26, 24);
  doc.setFontSize(10);
  doc.setFont("helvetica", "bold");
  doc.text(inv.number, right, y, { align: "right" });
  y += 5;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(110, 110, 110);
  doc.text(inv.date, right, y, { align: "right" });
  y += 4;
  doc.text("Due " + inv.due, right, y, { align: "right" });

  // ── Divider ──
  y += 8;
  doc.setDrawColor(221, 221, 221);
  doc.line(M, y, right, y);
  y += 10;

  // ── Bill to ──
  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text("BILL TO", M, y);
  if (inv.term) doc.text("TERM", M + 90, y);
  y += 5;
  doc.setFontSize(11);
  doc.setTextColor(26, 26, 24);
  doc.text(inv.clientName || "", M, y);
  if (inv.term) doc.text(inv.term, M + 90, y);
  if (inv.clientEmail) {
    y += 5;
    doc.setFontSize(9);
    doc.setTextColor(150, 150, 150);
    doc.text(inv.clientEmail, M, y);
  }

  // ── Line items table ──
  y += 12;
  const colQty = right - 90;
  const colRate = right - 55;
  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text("DESCRIPTION", M, y);
  doc.text("QTY", colQty, y, { align: "right" });
  doc.text("RATE", colRate, y, { align: "right" });
  doc.text("AMOUNT", right, y, { align: "right" });
  y += 3;
  doc.setDrawColor(221, 221, 221);
  doc.line(M, y, right, y);
  y += 7;

  doc.setFontSize(10);
  doc.setTextColor(26, 26, 24);
  const descLines = doc.splitTextToSize(inv.description || "", 90);
  doc.text(descLines, M, y);
  doc.text(String(inv.qty), colQty, y, { align: "right" });
  doc.text(gbp(inv.rate), colRate, y, { align: "right" });
  doc.text(gbp(inv.amount), right, y, { align: "right" });
  y += Math.max(7, descLines.length * 5);
  doc.setDrawColor(235, 235, 235);
  doc.line(M, y, right, y);

  // ── Total ──
  y += 9;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(12);
  doc.setTextColor(150, 150, 150);
  doc.text("Total due", colRate, y, { align: "right" });
  doc.setTextColor(26, 26, 24);
  doc.text(gbp(inv.amount), right, y, { align: "right" });

  // ── Payment details box ──
  y += 16;
  doc.setFillColor(245, 245, 240);
  const boxH = 26;
  doc.rect(M, y, right - M, boxH, "F");
  doc.setFont("helvetica", "bold");
  doc.setFontSize(9);
  doc.setTextColor(26, 26, 24);
  doc.text("Payment details", M + 5, y + 7);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(85, 85, 85);
  doc.text("Account name: " + (settings.accountName || ""), M + 5, y + 13);
  doc.text("Sort code: " + (settings.sortCode || "") + "    Account no: " + (settings.accountNo || ""), M + 5, y + 18);
  doc.text("Reference: " + inv.number + " - " + inv.clientName, M + 5, y + 23);

  doc.save(fileName);
}

function buildInvoiceText(inv, settings) {
  const lines = [
    `INVOICE`,
    ``,
    `From: ${settings.name}`,
    `      ${settings.email}  ·  ${settings.phone}`,
    ``,
    `Invoice No: ${inv.number}`,
    `Date:       ${fmtDate(inv.date)}`,
    `Due:        ${fmtDate(inv.due)}`,
    ``,
    `Bill To: ${inv.clientName}`,
    inv.clientEmail ? `         ${inv.clientEmail}` : "",
    ``,
    `Description: ${inv.description}`,
    ``,
    `  ${inv.qty} × lesson${inv.qty > 1 ? "s" : ""} @ ${fmtGBP(inv.rate)}`,
    ``,
    `TOTAL DUE: ${fmtGBP(inv.amount)}`,
    ``,
    `─────────────────────────────`,
    `Payment details`,
    `Account name: ${settings.accountName}`,
    `Sort code:    ${settings.sortCode}`,
    `Account no:   ${settings.accountNo}`,
    `Reference:    ${inv.number} — ${inv.clientName}`,
    ``,
    `Please use the reference above so your payment can be identified.`,
    `Thank you.`,
  ].filter((l) => l !== null);
  return lines.join("\n");
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ invoices, expenses, otherIncome, roster, setTab }) {
  const invoiceIncome = invoices.filter(i => i.status === "paid").reduce((a, i) => a + i.amount, 0);
  const extraIncome = otherIncome.reduce((a, i) => a + i.amount, 0);
  const totalIncome = invoiceIncome + extraIncome;
  const outstanding = invoices.filter(i => i.status === "sent").reduce((a, i) => a + i.amount, 0);
  const totalExp = expenses.reduce((a, e) => a + e.amount, 0);
  const overdue = invoices.filter(i => i.status === "sent" && i.due < today());
  const recent = [...invoices].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 5);

  const streams = [
    ["School teaching", invoices.filter(i => i.status === "paid" && i.type === "school").reduce((a,i) => a+i.amount, 0)],
    ["Private teaching", invoices.filter(i => i.status === "paid" && i.type === "private").reduce((a,i) => a+i.amount, 0)],
    ["Performances", invoices.filter(i => i.status === "paid" && i.type === "performance").reduce((a,i) => a+i.amount, 0) + otherIncome.filter(i => i.source === "Performance").reduce((a,i) => a+i.amount, 0)],
    ["Substack", otherIncome.filter(i => i.source === "Substack").reduce((a,i) => a+i.amount, 0)],
    ["Other", otherIncome.filter(i => i.source === "Other").reduce((a,i) => a+i.amount, 0)],
  ];

  return (
    <>
      <div className="stats">
        <div className="stat"><div className="stat-val">{fmtGBP(totalIncome)}</div><div className="stat-label">Income received</div></div>
        <div className="stat"><div className="stat-val">{fmtGBP(outstanding)}</div><div className="stat-label">Outstanding</div></div>
        <div className="stat"><div className="stat-val">{fmtGBP(totalIncome - totalExp)}</div><div className="stat-label">Net profit</div></div>
        <div className="stat"><div className="stat-val">{roster.length}</div><div className="stat-label">Students on roster</div></div>
      </div>

      {overdue.length > 0 && (
        <div className="panel" style={{borderColor: C.danger}}>
          <div className="panel-title text-danger">Overdue invoices</div>
          {overdue.map(inv => (
            <div key={inv.id} className="row mt-8">
              <span>{inv.number}</span>
              <span className="text-muted">— {inv.clientName}</span>
              <span className="spacer" />
              <span className="text-danger">{fmtGBP(inv.amount)}</span>
              <span className="text-muted" style={{fontSize:12}}>due {fmtDate(inv.due)}</span>
            </div>
          ))}
        </div>
      )}

      <div className="panel">
        <div className="panel-title">Income by stream</div>
        {streams.map(([label, val]) => (
          <div key={label} className="row" style={{padding:"6px 0", borderBottom:`1px solid ${C.border}`}}>
            <span className="text-muted" style={{fontSize:13}}>{label}</span>
            <span className="spacer" />
            <span style={{fontFamily:"'Cormorant Garamond', serif", fontSize:16}} className={val > 0 ? "" : "text-muted"}>{val > 0 ? fmtGBP(val) : "—"}</span>
          </div>
        ))}
      </div>

      <div className="panel">
        <div className="row">
          <div className="panel-title" style={{marginBottom:0}}>Recent invoices</div>
          <div className="spacer" />
          <button className="btn btn-ghost btn-sm" onClick={() => setTab("log")}>View all</button>
        </div>
        <div className="mt-16">
          {recent.length === 0 ? <div className="empty">No invoices yet — create your first one.</div> : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Invoice</th><th>Client</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>
                  {recent.map(inv => (
                    <tr key={inv.id}>
                      <td className="text-accent">{inv.number}</td>
                      <td>{inv.clientName}</td>
                      <td className="text-muted">{fmtDate(inv.date)}</td>
                      <td>{fmtGBP(inv.amount)}</td>
                      <td><StatusBadge status={inv.status} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ── Roster ────────────────────────────────────────────────────────────────────
function Roster({ roster, persistRoster }) {
  const [subTab, setSubTab] = useState("school");
  const [form, setForm] = useState(null);

  const blank = (type) => ({
    id: Date.now(), type,
    firstName: "", surname: "", yearGroup: "", guardianName: "",
    email: "", organisation: "", address1: "", address2: "", city: "", postcode: "",
    rate: "", duration: "30 min", payment: "", notes: ""
  });

  const schoolStudents = roster.filter(s => s.type === "school");
  const privateStudents = roster.filter(s => s.type === "private");
  const performanceContacts = roster.filter(s => s.type === "performance");
  const substackContacts = roster.filter(s => s.type === "substack");

  const lists = { school: schoolStudents, private: privateStudents, performance: performanceContacts, substack: substackContacts };

  function save(student) {
    const exists = roster.find(r => r.id === student.id);
    const updated = exists ? roster.map(r => r.id === student.id ? student : r) : [...roster, student];
    persistRoster(updated);
    setForm(null);
  }

  function del(id) {
    persistRoster(roster.filter(r => r.id !== id));
  }

  return (
    <>
      <div className="tabs">
        <button className={`tab${subTab==="school"?" active":""}`} onClick={() => setSubTab("school")}>St Margaret's ({schoolStudents.length})</button>
        <button className={`tab${subTab==="private"?" active":""}`} onClick={() => setSubTab("private")}>Private ({privateStudents.length})</button>
        <button className={`tab${subTab==="performance"?" active":""}`} onClick={() => setSubTab("performance")}>Performances ({performanceContacts.length})</button>
        <button className={`tab${subTab==="substack"?" active":""}`} onClick={() => setSubTab("substack")}>Substack ({substackContacts.length})</button>
      </div>

      {form ? (
        <StudentForm student={form} onSave={save} onCancel={() => setForm(null)} />
      ) : (
        <>
          <div className="row" style={{marginBottom:16}}>
            <div className="spacer" />
            <button className="btn btn-primary" onClick={() => setForm(blank(subTab))}>+ Add {subTab === "school" || subTab === "private" ? "student" : subTab === "performance" ? "client / venue" : "contact"}</button>
          </div>
          <StudentTable
            students={lists[subTab]}
            type={subTab}
            onEdit={setForm}
            onDelete={del}
          />
        </>
      )}
    </>
  );
}

// ── New Invoice ───────────────────────────────────────────────────────────────
function NewInvoice({ roster, invoices, nextInv, settings, persistInvoices, persistNextInv }) {
  const [invType, setInvType] = useState("school");
  const [studentId, setStudentId] = useState("");
  const [qty, setQty] = useState(10);
  const [term, setTerm] = useState("Autumn 2025");
  const [invDate, setInvDate] = useState(today());
  const [preview, setPreview] = useState(null);
  const [sent, setSent] = useState(false);

  const students = roster.filter(s => s.type === invType);
  const student = students.find(s => s.id === Number(studentId));
  const [customRate, setCustomRate] = useState("");
  const baseRate = invType === "school" ? settings.schoolRate : (student?.rate || 0);
  const rate = invType === "performance" && customRate !== "" ? Number(customRate) : baseRate;
  const amount = qty * rate;
  const number = nextInvNum(nextInv);

  function buildInvoice() {
    const clientName = invType === "school"
      ? (student.guardianName || `${student.firstName} ${student.surname}`)
      : invType === "performance"
        ? (student.organisation || student.firstName)
        : student.firstName;
    const clientEmail = student.email || "";
    const description = invType === "school"
      ? `Guitar tuition — ${student.firstName} ${student.surname}, ${term}`
      : invType === "performance"
        ? `Performance fee — ${student.organisation || student.firstName}`
        : `Guitar tuition — ${student.firstName}`;

    return {
      id: Date.now(),
      number,
      type: invType,
      clientName,
      clientEmail,
      studentName: invType === "school" ? `${student.firstName} ${student.surname}` : student.firstName,
      description,
      qty: Number(qty),
      rate: Number(rate),
      amount: Number(amount),
      date: invDate,
      due: dueDate(invDate),
      term: invType === "school" ? term : "",
      status: "draft",
    };
  }

  function handlePreview() {
    if (!student) return;
    setPreview(buildInvoice());
    setSent(false);
  }

  async function handleSendEmail() {
    const inv = preview || buildInvoice();
    const body = buildInvoiceText(inv, settings);
    const subject = `${inv.number} — Guitar tuition — ${inv.clientName}`;
    const mailto = `mailto:${inv.clientEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto, "_blank");

    // Save to log with status "sent"
    const saved = { ...inv, status: "sent" };
    const updated = [...invoices, saved];
    await persistInvoices(updated);
    await persistNextInv(nextInv + 1);
    setSent(true);
    setPreview(saved);
  }

  return (
    <>
      <div className="panel">
        <div className="panel-title">Create invoice</div>

        <div className="tabs" style={{marginBottom:16}}>
          <button className={`tab${invType==="school"?" active":""}`} onClick={() => { setInvType("school"); setStudentId(""); setQty(10); setCustomRate(""); }}>School</button>
          <button className={`tab${invType==="private"?" active":""}`} onClick={() => { setInvType("private"); setStudentId(""); setQty(1); setCustomRate(""); }}>Private</button>
          <button className={`tab${invType==="performance"?" active":""}`} onClick={() => { setInvType("performance"); setStudentId(""); setQty(1); setCustomRate(""); }}>Performance</button>
        </div>

        <div className="grid-2">
          <div className="field">
            <label>{invType === "performance" ? "Client / venue" : "Student"}</label>
            <select value={studentId} onChange={e => { setStudentId(e.target.value); setCustomRate(""); }}>
              <option value="">— select —</option>
              {students.map(s => (
                <option key={s.id} value={s.id}>
                  {invType === "school" ? `${s.firstName} ${s.surname}` : invType === "performance" ? (s.organisation || s.firstName) : s.firstName}
                </option>
              ))}
            </select>
          </div>
          <div className="field"><label>Invoice date</label><input type="date" value={invDate} onChange={e => setInvDate(e.target.value)} /></div>
        </div>

        <div className="grid-3">
          <div className="field">
            <label>{invType === "performance" ? "Engagements (qty)" : "Lessons (qty)"}</label>
            <input type="number" value={qty} onChange={e => setQty(e.target.value)} min={1} />
          </div>
          <div className="field">
            <label>{invType === "performance" ? "Fee (£) — editable" : "Rate (£)"}</label>
            {invType === "performance" ? (
              <input type="number" value={customRate !== "" ? customRate : baseRate} onChange={e => setCustomRate(e.target.value)} />
            ) : (
              <input type="number" value={rate} readOnly style={{opacity:.7}} />
            )}
          </div>
          {invType === "school" && (
            <div className="field">
              <label>Term</label>
              <select value={term} onChange={e => setTerm(e.target.value)}>
                {["Autumn 2024","Spring 2025","Summer 2025","Autumn 2025","Spring 2026","Summer 2026","Autumn 2026"].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
          )}
        </div>

        {student && (
          <div className="row" style={{marginTop:8, padding:"10px 12px", background: C.raised, borderRadius:4}}>
            <span className="text-muted" style={{fontSize:12}}>Invoice {number}</span>
            <span className="spacer" />
            <span style={{fontFamily:"'Cormorant Garamond', serif", fontSize:18}}>{fmtGBP(amount)}</span>
          </div>
        )}

        <div className="row mt-16">
          <button className="btn btn-primary" onClick={handlePreview} disabled={!student}>Preview invoice</button>
        </div>
      </div>

      {preview && (
        <div>
          <InvoicePreview inv={preview} settings={settings} />
          <div className="row mt-16">
            {!sent ? (
              <button className="btn btn-success" onClick={handleSendEmail}>
                Open in Mail — {preview.clientEmail || "no email on file"}
              </button>
            ) : (
              <span className="text-success">✓ Saved to invoice log as Sent</span>
            )}
            <button className="btn btn-ghost" onClick={async () => {
              downloadInvoice(preview, settings);
              if (!sent) {
                const saved = { ...preview, status: "sent" };
                await persistInvoices([...invoices, saved]);
                await persistNextInv(nextInv + 1);
                setSent(true);
                setPreview(saved);
              }
            }}>
              Download PDF
            </button>
          </div>
        </div>
      )}
    </>
  );
}

// ── Invoice Log ───────────────────────────────────────────────────────────────
function InvoiceLog({ invoices, persistInvoices }) {
  const sorted = [...invoices].filter(i => !i.manual).sort((a, b) => b.date.localeCompare(a.date));

  async function markPaid(id) {
    const updated = invoices.map(i => i.id === id ? { ...i, status: "paid", paidDate: today() } : i);
    await persistInvoices(updated);
  }

  async function del(id) {
    await persistInvoices(invoices.filter(i => i.id !== id));
  }

  if (sorted.length === 0) return <div className="empty">No invoices yet.</div>;

  return (
    <div className="table-wrap">
      <table>
        <thead>
          <tr><th>No.</th><th>Client</th><th>Type</th><th>Date</th><th>Due</th><th>Amount</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
          {sorted.map(inv => (
            <tr key={inv.id}>
              <td className="text-accent">{inv.number}</td>
              <td>{inv.clientName}</td>
              <td className="text-muted" style={{textTransform:"capitalize"}}>{inv.type}</td>
              <td className="text-muted">{fmtDate(inv.date)}</td>
              <td className={inv.status === "sent" && inv.due < today() ? "text-danger" : "text-muted"}>{fmtDate(inv.due)}</td>
              <td>{fmtGBP(inv.amount)}</td>
              <td><StatusBadge status={inv.status === "sent" && inv.due < today() ? "overdue" : inv.status} /></td>
              <td>
                <div className="row">
                  {inv.status !== "paid" && (
                    <button className="btn btn-success btn-sm" onClick={() => markPaid(inv.id)}>Mark paid</button>
                  )}
                  <button className="btn btn-danger btn-sm" onClick={() => del(inv.id)}>×</button>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Expenses ──────────────────────────────────────────────────────────────────
function ExpensesPage({ expenses, invoices, otherIncome, roster, persistExpenses, persistOtherIncome, persistInvoices }) {
  const [subTab, setSubTab] = useState("payments");
  const [form, setForm] = useState({ date: today(), description: "", category: "Strings & consumables", supplier: "", amount: "", receipt: false, notes: "" });
  const [incForm, setIncForm] = useState({ date: today(), source: "Performance", description: "", payer: "", amount: "", notes: "" });
  const [payForm, setPayForm] = useState({ date: today(), type: "school", studentId: "", clientName: "", amount: "", notes: "" });

  const CATS = ["Strings & consumables","Sheet music / scores","Equipment","Travel","Professional development","Software / subscriptions","Marketing","Insurance","Other"];
  const SOURCES = ["Performance","Substack","Other"];

  // Manually-logged payments are stored as invoices with status "paid" and a manual flag,
  // so they flow through every total identically to invoiced-then-paid income.
  const payStudents = roster.filter(s => s.type === payForm.type);

  async function addPayment() {
    if (!payForm.amount || (!payForm.studentId && !payForm.clientName)) return;
    const student = roster.find(s => s.id === Number(payForm.studentId));
    const name = student
      ? (payForm.type === "school" ? `${student.firstName} ${student.surname}` : (student.organisation || student.firstName))
      : payForm.clientName;
    const rec = {
      id: Date.now(),
      number: "—",
      type: payForm.type,
      clientName: name,
      clientEmail: student?.email || "",
      studentName: name,
      description: payForm.notes || `${payForm.type.charAt(0).toUpperCase() + payForm.type.slice(1)} payment — ${name}`,
      qty: 1,
      rate: Number(payForm.amount),
      amount: Number(payForm.amount),
      date: payForm.date,
      due: payForm.date,
      term: "",
      status: "paid",
      paidDate: payForm.date,
      manual: true,
    };
    await persistInvoices([...invoices, rec]);
    setPayForm({ date: today(), type: payForm.type, studentId: "", clientName: "", amount: "", notes: "" });
  }

  async function delPayment(id) {
    await persistInvoices(invoices.filter(i => i.id !== id));
  }


  async function addExpense() {
    if (!form.description || !form.amount) return;
    const updated = [...expenses, { ...form, id: Date.now(), amount: Number(form.amount) }];
    await persistExpenses(updated);
    setForm({ date: today(), description: "", category: "Strings & consumables", supplier: "", amount: "", receipt: false, notes: "" });
  }

  async function delExpense(id) {
    await persistExpenses(expenses.filter(e => e.id !== id));
  }

  async function addIncome() {
    if (!incForm.description || !incForm.amount) return;
    const updated = [...otherIncome, { ...incForm, id: Date.now(), amount: Number(incForm.amount) }];
    await persistOtherIncome(updated);
    setIncForm({ date: today(), source: "Performance", description: "", payer: "", amount: "", notes: "" });

  async function delIncome(id) {
    await persistOtherIncome(otherIncome.filter(e => e.id !== id));

  const invoiceIncome = invoices.filter(i => i.status === "paid").reduce((a, i) => a + i.amount, 0);
  const extraIncome = otherIncome.reduce((a, i) => a + i.amount, 0);
  const totalIncome = invoiceIncome + extraIncome;
  const totalExp = expenses.reduce((a, e) => a + e.amount, 0);

  // Tax year runs 6 April – 5 April. Months ordered Apr → Mar.
  const taxMonths = [
    { label: "Apr", m: "04", yOff: 0 }, { label: "May", m: "05", yOff: 0 }, { label: "Jun", m: "06", yOff: 0 },
    { label: "Jul", m: "07", yOff: 0 }, { label: "Aug", m: "08", yOff: 0 }, { label: "Sep", m: "09", yOff: 0 },
    { label: "Oct", m: "10", yOff: 0 }, { label: "Nov", m: "11", yOff: 0 }, { label: "Dec", m: "12", yOff: 0 },
    { label: "Jan", m: "01", yOff: 1 }, { label: "Feb", m: "02", yOff: 1 }, { label: "Mar", m: "03", yOff: 1 },
  ];
  const [taxYearStart, setTaxYearStart] = useState(2025); // 2025 means 2025/26
  const taxYears = [2023, 2024, 2025, 2026];

  // All paid income (invoiced + manually logged) plus other income, within a tax year
  function inTaxYear(dateStr, startYear) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    const start = new Date(`${startYear}-04-06`);
    const end = new Date(`${startYear + 1}-04-05T23:59:59`);
    return d >= start && d <= end;
  }

  const tyInvoiceIncome = invoices.filter(i => i.status === "paid" && inTaxYear(i.date, taxYearStart)).reduce((a,i) => a+i.amount, 0);
  const tyOtherIncome = otherIncome.filter(i => inTaxYear(i.date, taxYearStart)).reduce((a,i) => a+i.amount, 0);
  const tyIncome = tyInvoiceIncome + tyOtherIncome;
  const tyExpenses = expenses.filter(e => inTaxYear(e.date, taxYearStart)).reduce((a,e) => a+e.amount, 0);

  // Income by stream within the tax year (for self-assessment categorisation)
  const tyStreams = [
    ["School teaching", invoices.filter(i => i.status === "paid" && i.type === "school" && inTaxYear(i.date, taxYearStart)).reduce((a,i)=>a+i.amount,0)],
    ["Private teaching", invoices.filter(i => i.status === "paid" && i.type === "private" && inTaxYear(i.date, taxYearStart)).reduce((a,i)=>a+i.amount,0)],
    ["Performances", invoices.filter(i => i.status === "paid" && i.type === "performance" && inTaxYear(i.date, taxYearStart)).reduce((a,i)=>a+i.amount,0) + otherIncome.filter(i => i.source === "Performance" && inTaxYear(i.date, taxYearStart)).reduce((a,i)=>a+i.amount,0)],
    ["Substack", otherIncome.filter(i => i.source === "Substack" && inTaxYear(i.date, taxYearStart)).reduce((a,i)=>a+i.amount,0)],
    ["Other", otherIncome.filter(i => i.source === "Other" && inTaxYear(i.date, taxYearStart)).reduce((a,i)=>a+i.amount,0)],
  ];

  return (
    <>
      <div className="tabs">
        <button className={`tab${subTab==="payments"?" active":""}`} onClick={() => setSubTab("payments")}>Log Payment</button>
        <button className={`tab${subTab==="income"?" active":""}`} onClick={() => setSubTab("income")}>Other Income</button>
        <button className={`tab${subTab==="expenses"?" active":""}`} onClick={() => setSubTab("expenses")}>Expenses</button>
        <button className={`tab${subTab==="summary"?" active":""}`} onClick={() => setSubTab("summary")}>Summary</button>
      </div>

      {subTab === "payments" && (
        <>
          <div className="panel">
            <div className="panel-title">Log a received payment</div>
            <p className="text-muted" style={{fontSize:13, marginBottom:16}}>Record money already received — including from earlier in the tax year — without issuing an invoice. These flow into your totals and tax-year summary exactly like paid invoices.</p>
            <div className="grid-3">
              <div className="field"><label>Date received</label><input type="date" value={payForm.date} onChange={e => setPayForm({...payForm, date:e.target.value})} /></div>
              <div className="field"><label>Stream</label>
                <select value={payForm.type} onChange={e => setPayForm({...payForm, type:e.target.value, studentId:"", clientName:""})}>
                  <option value="school">School</option>
                  <option value="private">Private</option>
                  <option value="performance">Performance</option>
                </select>
              </div>
              <div className="field"><label>Amount (£)</label><input type="number" value={payForm.amount} onChange={e => setPayForm({...payForm, amount:e.target.value})} /></div>
            </div>
            <div className="grid-2">
              <div className="field"><label>Student / client from roster</label>
                <select value={payForm.studentId} onChange={e => setPayForm({...payForm, studentId:e.target.value, clientName:""})}>
                  <option value="">— select or use free text below —</option>
                  {payStudents.map(s => (
                    <option key={s.id} value={s.id}>{payForm.type === "school" ? `${s.firstName} ${s.surname}` : (s.organisation || s.firstName)}</option>
                  ))}
                </select>
              </div>
              <div className="field"><label>Or one-off name</label><input value={payForm.clientName} onChange={e => setPayForm({...payForm, clientName:e.target.value, studentId:""})} placeholder="e.g. former student, ad-hoc gig" /></div>
            </div>
            <div className="field"><label>Note (optional)</label><input value={payForm.notes} onChange={e => setPayForm({...payForm, notes:e.target.value})} placeholder="e.g. Spring term 2025, paid by cash" /></div>
            <button className="btn btn-primary" onClick={addPayment}>Log payment</button>
          </div>

          <div className="table-wrap">
            {invoices.filter(i => i.manual).length === 0 ? <div className="empty">No manually-logged payments yet.</div> : (
              <table>
                <thead><tr><th>Date</th><th>Stream</th><th>From</th><th>Amount</th><th>Note</th><th></th></tr></thead>
                <tbody>
                  {[...invoices].filter(i => i.manual).sort((a,b) => b.date.localeCompare(a.date)).map(p => (
                    <tr key={p.id}>
                      <td className="text-muted">{fmtDate(p.date)}</td>
                      <td className="text-muted" style={{textTransform:"capitalize"}}>{p.type}</td>
                      <td>{p.clientName}</td>
                      <td className="text-success">{fmtGBP(p.amount)}</td>
                      <td className="text-muted" style={{maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{p.description}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={() => delPayment(p.id)}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {subTab === "income" && (
        <>
          <div className="panel">
            <div className="panel-title">Add income — performances, Substack, other</div>
            <div className="grid-3">
              <div className="field"><label>Date</label><input type="date" value={incForm.date} onChange={e => setIncForm({...incForm, date:e.target.value})} /></div>
              <div className="field"><label>Source</label>

                  {SOURCES.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="field"><label>Amount (£)</label><input type="number" value={incForm.amount} onChange={e => setIncForm({...incForm, amount:e.target.value})} /></div>
            </div>
            <div className="grid-2">
              <div className="field"><label>Description</label><input value={incForm.description} onChange={e => setIncForm({...incForm, description:e.target.value})} placeholder="e.g. Live Music Now concert, March payout" /></div>
              <div className="field"><label>Payer / venue</label><input value={incForm.payer} onChange={e => setIncForm({...incForm, payer:e.target.value})} placeholder="e.g. Concert society, Substack" /></div>
            </div>
            <button className="btn btn-primary" onClick={addIncome}>Add income</button>
          </div>

          <div className="table-wrap">
            {otherIncome.length === 0 ? <div className="empty">No performance or Substack income recorded yet.</div> : (
              <table>
                <thead><tr><th>Date</th><th>Source</th><th>Description</th><th>Payer</th><th>Amount</th><th></th></tr></thead>
                <tbody>
                  {[...otherIncome].sort((a,b) => b.date.localeCompare(a.date)).map(e => (

                      <td><span className="badge badge-sent">{e.source}</span></td>
                      <td>{e.description}</td>
                      <td className="text-muted">{e.payer || "—"}</td>

              <div className="field"><label>Description</label><input value={form.description} onChange={e => setForm({...form, description:e.target.value})} /></div>
              <div className="field"><label>Category</label>

            {expenses.length === 0 ? <div className="empty">No expenses recorded yet.</div> : (
              <table>
                <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Supplier</th><th>Amount</th><th></th></tr></thead>
                <tbody>
                  {[...expenses].sort((a,b) => b.date.localeCompare(a.date)).map(e => (
                    <tr key={e.id}>
                      <td className="text-muted">{fmtDate(e.date)}</td>
                      <td>{e.description}</td>
                      <td className="text-muted">{e.category}</td>
                      <td className="text-muted">{e.supplier || "—"}</td>
                      <td>{fmtGBP(e.amount)}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={() => delExpense(e.id)}>×</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}

      {subTab === "summary" && (
        <>
          <div className="row" style={{marginBottom:16}}>
            <div className="field" style={{maxWidth:220, marginBottom:0}}>
              <label>Tax year</label>
              <select value={taxYearStart} onChange={e => setTaxYearStart(Number(e.target.value))}>
                {taxYears.map(y => <option key={y} value={y}>6 Apr {y} – 5 Apr {y+1}  ({y}/{String(y+1).slice(2)})</option>)}
              </select>
            </div>
          </div>

          <div className="stats">
            <div className="stat"><div className="stat-val">{fmtGBP(tyIncome)}</div><div className="stat-label">Income this tax year</div></div>
            <div className="stat"><div className="stat-val">{fmtGBP(tyExpenses)}</div><div className="stat-label">Expenses this tax year</div></div>
            <div className="stat"><div className="stat-val">{fmtGBP(tyIncome - tyExpenses)}</div><div className="stat-label">Net profit (taxable)</div></div>
          </div>

          <div className="panel">
            <div className="panel-title">Income by stream — {taxYearStart}/{String(taxYearStart+1).slice(2)}</div>
            <p className="text-muted" style={{fontSize:12, marginBottom:12}}>This is your gross self-employment income for the year. Check whether your St Margaret's work is paid via PAYE — if so, it sits outside self-employment income for tax purposes.</p>
            {tyStreams.map(([label, val]) => (
              <div key={label} className="row" style={{padding:"6px 0", borderBottom:`1px solid ${C.border}`}}>
                <span className="text-muted" style={{fontSize:13}}>{label}</span>
                <span className="spacer" />
                <span style={{fontFamily:"'Cormorant Garamond', serif", fontSize:16}} className={val > 0 ? "" : "text-muted"}>{val > 0 ? fmtGBP(val) : "—"}</span>
              </div>
            ))}
            <div className="row" style={{padding:"10px 0 0", fontWeight:500}}>
              <span style={{fontSize:13}}>Gross income</span>
              <span className="spacer" />
              <span style={{fontFamily:"'Cormorant Garamond', serif", fontSize:18}} className="text-accent">{fmtGBP(tyIncome)}</span>
            </div>
          </div>

          <div className="panel">
            <div className="panel-title">Monthly breakdown — {taxYearStart}/{String(taxYearStart+1).slice(2)}</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Month</th><th>Income</th><th>Expenses</th><th>Net</th></tr></thead>
                <tbody>
                  {taxMonths.map(({label, m, yOff}) => {
                    const y = taxYearStart + yOff;
                    const prefix = `${y}-${m}`;
                    const inc = invoices.filter(i => i.status === "paid" && i.date.startsWith(prefix)).reduce((a,i) => a+i.amount, 0)
                      + otherIncome.filter(i => i.date.startsWith(prefix)).reduce((a,i) => a+i.amount, 0);
                    const exp = expenses.filter(e => e.date.startsWith(prefix)).reduce((a,e) => a+e.amount, 0);
                    const net = inc - exp;
                    return (
                      <tr key={label}>
                        <td>{label} {y}</td>
                        <td className="text-success">{inc > 0 ? fmtGBP(inc) : <span className="text-muted">—</span>}</td>
                        <td className="text-danger">{exp > 0 ? fmtGBP(exp) : <span className="text-muted">—</span>}</td>
                        <td className={net > 0 ? "text-success" : net < 0 ? "text-danger" : "text-muted"}>{net !== 0 ? fmtGBP(net) : "—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div className="panel">
            <div className="panel-title">Expenses by category — {taxYearStart}/{String(taxYearStart+1).slice(2)}</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Category</th><th>Total</th></tr></thead>
                <tbody>
                  {CATS.map(cat => {
                    const total = expenses.filter(e => e.category === cat && inTaxYear(e.date, taxYearStart)).reduce((a,e) => a+e.amount, 0);
                    if (total === 0) return null;
                    return (
                      <tr key={cat}>
                        <td className="text-muted">{cat}</td>
                        <td className="text-danger">{fmtGBP(total)}</td>
                      </tr>
                    );
                  })}
                  {expenses.filter(e => inTaxYear(e.date, taxYearStart)).length === 0 && (
                    <tr><td colSpan={2} className="text-muted" style={{textAlign:"center", padding:"20px"}}>No expenses recorded for this tax year.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

    </>
  );
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportData(roster, invoices, expenses, otherIncome, settings) {
  const data = {
    exportDate: new Date().toISOString(),
    settings,
    roster,
    invoices,
    expenses,
    otherIncome,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `jlguitar-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file, persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistSettings, persistNextInv, setMsg) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.roster) await persistRoster(data.roster);
      if (data.invoices) await persistInvoices(data.invoices);
      if (data.expenses) await persistExpenses(data.expenses);
      if (data.otherIncome) await persistOtherIncome(data.otherIncome);
      if (data.settings) await persistSettings(data.settings);
      if (data.invoices && data.invoices.length > 0) {
        const maxInv = data.invoices.reduce((max, inv) => {
          const n = parseInt(inv.number.replace('INV-', ''));
          return n > max ? n : max;
        }, 0);
        await persistNextInv(maxInv + 1);
      }
      setMsg('✓ Data restored successfully');
    } catch {
      setMsg('Import failed — file may be corrupted');
    }
  };
  reader.readAsText(file);
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({ settings, persistSettings, roster, invoices, expenses, otherIncome, persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistNextInv }) {
  const [s, setS] = useState(settings);
  const [msg, setMsg] = useState("");
  const f = k => e => setS({...s, [k]: e.target.value});

  return (
    <>
    <div className="panel">
      <div className="panel-title">Your details</div>
      <div className="grid-2">
        <div className="field"><label>Full name</label><input value={s.name} onChange={f("name")} /></div>
        <div className="field"><label>Business name</label><input value={s.business} onChange={f("business")} /></div>
        <div className="field"><label>Email</label><input value={s.email} onChange={f("email")} /></div>
        <div className="field"><label>Phone</label><input value={s.phone} onChange={f("phone")} /></div>
      </div>
      <div className="panel-title" style={{marginTop:20}}>Bank details</div>
      <div className="grid-3">
        <div className="field"><label>Account name</label><input value={s.accountName} onChange={f("accountName")} /></div>
        <div className="field"><label>Sort code</label><input value={s.sortCode} onChange={f("sortCode")} placeholder="XX-XX-XX" /></div>
        <div className="field"><label>Account number</label><input value={s.accountNo} onChange={f("accountNo")} /></div>
      </div>
      <div className="panel-title" style={{marginTop:20}}>Rates</div>
      <div className="field" style={{maxWidth:200}}>
        <label>St Margaret's rate per lesson (£)</label>
        <input type="number" value={s.schoolRate} onChange={f("schoolRate")} />
      </div>
      <button className="btn btn-primary mt-16" onClick={() => persistSettings(s)}>Save settings</button>
    </div>
    <div className="panel" style={{marginTop:0}}>
      <div className="panel-title">Data backup</div>
      <p className="text-muted" style={{fontSize:13, marginBottom:16}}>Export a backup of all your data — roster, invoices, expenses, and settings — as a JSON file saved to your device. Import it here to restore.</p>
      <div className="row">
        <button className="btn btn-primary" onClick={() => exportData(roster, invoices, expenses, otherIncome, settings)}>Export backup</button>
        <label className="btn btn-ghost" style={{cursor:"pointer"}}>
          Import backup
          <input type="file" accept=".json" style={{display:"none"}} onChange={e => { if (e.target.files[0]) importData(e.target.files[0], persistRoster, persistInvoices, persistExpenses, persistOtherIncome, persistSettings, persistNextInv, setMsg); }} />
        </label>
      </div>
      {msg && <p className="text-success mt-8" style={{fontSize:13}}>{msg}</p>}
    </div>
    </>
  );
}

// ── Status badge ──────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = { draft:"badge-draft", sent:"badge-sent", paid:"badge-paid", overdue:"badge-overdue" };
  return <span className={`badge ${map[status] || "badge-draft"}`}>{status}</span>;
}


function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  async function signIn() {
    setErr(""); setBusy(true);
    try { await window.fbSignIn(window.fbAuth, email.trim(), password); }
    catch (e) { setErr("Sign-in failed. Check your email and password."); setBusy(false); }
  }
  return (
    <div className="app" style={{maxWidth:380, paddingTop:80}}>
      <div className="header" style={{justifyContent:"center", borderBottom:"none"}}>
        <span className="header-title">James Lind Guitar</span>
      </div>
      <div className="panel">
        <div className="panel-title">Sign in</div>
        <div className="field"><label>Email</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key==="Enter" && signIn()} /></div>
        <div className="field"><label>Password</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key==="Enter" && signIn()} /></div>
        {err && <p className="text-danger" style={{fontSize:13, marginBottom:12}}>{err}</p>}
        <button className="btn btn-primary" onClick={signIn} disabled={busy}>{busy ? "Signing in…" : "Sign in"}</button>
      </div>
    </div>
  );
}

    function mount() {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    (function waitForDeps(attempt) {
      if (window.fbAuth && window.fbDb && window.React && window.ReactDOM) { mount(); }
      else if (attempt < 150) { setTimeout(() => waitForDeps(attempt + 1), 50); }
      else {
        var missing = [];
        if (!window.React || !window.ReactDOM) missing.push("React");
        if (!window.fbAuth || !window.fbDb) missing.push("Firebase");
        document.getElementById('root').innerHTML =
          '<div style="font-family:sans-serif;padding:40px;color:#b85050">Could not load: ' + missing.join(", ") + '. Check your connection and refresh the page.</div>';
      }
    })(0);
  </script>
</body>
